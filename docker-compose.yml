services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: paperhub
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
