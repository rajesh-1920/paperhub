# Full stack: the PaperHub app + a MongoDB database (binaries in GridFS).
# Start it:   docker compose up -d --build      then open http://localhost:8000
#
# Prefer zero external dependencies? Use the JSON-file store instead:
#   docker compose -f docker-compose.jsonstore.yml up -d --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    init: true
    # Optional: drop a .env next to this file to override the secrets below.
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: paperhub
      PORT: "8000"
      # Override these via a .env file or your shell. The defaults are for local
      # demos only — set strong random secrets (and NODE_ENV=production) in prod.
      JWT_SECRET: ${JWT_SECRET:-paperhub-local-demo-secret-change-me-please}
      REFRESH_SECRET: ${REFRESH_SECRET:-paperhub-local-demo-refresh-change-me-please}
      ACCESS_TTL: ${ACCESS_TTL:-15m}
      REFRESH_TTL: ${REFRESH_TTL:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      # Optional "Sign in with Google" web client id (public; no secret needed).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
