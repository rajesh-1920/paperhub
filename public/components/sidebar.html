<!-- Mobile Sidebar Overlay -->
<div id="sidebarOverlay" class="fixed inset-0 z-30 bg-black/50 hidden md:hidden" onclick="closeMobileSidebar()"></div>

<style>
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.625rem 0.75rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: rgb(51 65 85);
    transition: color 150ms ease, background-color 150ms ease;
  }

  .sidebar-link:hover {
    color: rgb(2 132 199);
    background: rgb(240 249 255);
  }

  .dark .sidebar-link {
    color: rgb(203 213 225);
  }

  .dark .sidebar-link:hover {
    color: rgb(125 211 252);
    background: rgba(14, 116, 144, 0.2);
  }

  .sidebar-link.active {
    color: rgb(2 132 199);
    background: rgb(224 242 254);
    font-weight: 600;
  }
</style>

<script>
  function closeMobileSidebar() {
    document.getElementById('paperhubSidebar').classList.add('hidden');
    document.getElementById('sidebarOverlay').classList.add('hidden');
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    localStorage.setItem('paperhub-theme', isDark ? 'dark' : 'light');
    
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (isDark) {
      icon.textContent = '☀️';
      label.textContent = 'Light Mode';
    } else {
      icon.textContent = '🌙';
      label.textContent = 'Dark Mode';
    }
  }

  function handleSignOut() {
    localStorage.removeItem('paperhub-user');
    window.location.href = '/pages/auth/login.html';
  }

  // Initialize sidebar links visibility based on user role
  function initializeSidebarLinks() {
    const userRole = localStorage.getItem('paperhub-user-role') || 'user';
    const links = document.querySelectorAll('.sidebar-link[data-roles]');
    
    links.forEach(link => {
      const roles = link.getAttribute('data-roles').split(',').map(r => r.trim());
      if (!roles.includes(userRole)) {
        link.style.display = 'none';
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initializeSidebarLinks);
</script>
