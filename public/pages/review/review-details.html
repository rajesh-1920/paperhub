<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Review Details - PaperHub</title>
  <script src="../../assets/js/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/tailwind.css" />
  <link rel="stylesheet" href="../../assets/css/global.css" />
  <link rel="stylesheet" href="../../assets/css/components/review-details.css" />
</head>

<body class="review-details-page">
  <div id="navbar-container"></div>
  <div id="sidebar-container"></div>

  <main>
    <div class="page-content review-shell">
      <section class="review-hero card review-detail-hero">
        <div class="review-hero-copy">
          <p class="eyebrow">Review Flow</p>
          <h1>File review details</h1>
          <p class="review-hero-text">See the file, the current review status, the reason it was routed here, and the
            discussion history in one place.</p>

          <div id="reviewDetailsHeroMeta" class="review-detail-hero-meta"></div>
        </div>

        <div class="review-hero-actions review-detail-actions-top">
          <a href="review-queue.html" data-app-href="pages/review/review-queue.html" class="btn btn-outline">Back to
            queue</a>
          <div class="review-detail-actions-note">
            <span data-review-access-note>Document ready for decision</span>
            <strong data-review-status-label>Pending</strong>
          </div>
        </div>
      </section>

      <div class="review-detail-main review-detail-main-full">
        <div id="reviewDetailsContent"></div>
        <div class="review-detailscard review-action-bar action-buttons hidden" data-review-action-bar>
          <button id="approveBtn" class="btn btn-success" type="button">Approve</button>
          <button id="rejectBtn" class="btn btn-danger" type="button">Reject</button>
          <button id="forwardBtn" class="btn btn-primary" type="button">Forward</button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/review.js"></script>
</body>

</html>
