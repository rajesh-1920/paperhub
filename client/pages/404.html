<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PaperHub custom 404 page for missing routes" />
    <title>PaperHub | 404 Page Not Found</title>

    <link rel="stylesheet" href="../styles/variables.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
  </head>
  <body>
    <main class="error-page" aria-label="Page not found">
      <section class="error-card">
        <div class="error-card__top">
          <a class="brand" href="index.html">
            <span class="brand__mark">PH</span>
            <span class="brand__text">PaperHub</span>
          </a>
          <span class="error-code">404</span>
        </div>

        <div>
          <h1>Page Not Found</h1>
          <p class="card__subtitle error-message">
            The page you are looking for does not exist or may have been moved. Try returning to the
            home page to continue your workflow.
          </p>
        </div>

        <div class="error-illustration" aria-label="Illustration placeholder">
          <div>
            <div class="error-illustration__icon">?</div>
            <h2 class="card__title">Illustration Placeholder</h2>
            <p class="error-illustration__label">
              Add your custom 404 artwork or brand illustration in this area.
            </p>
          </div>
        </div>

        <div class="error-actions">
          <a class="btn btn--primary" href="index.html">Go Back Home</a>
          <a class="btn btn--outline" href="dashboard.html">Open Dashboard</a>
        </div>
      </section>
    </main>
  </body>
</html>
