<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - PaperHub</title>
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/pages/errors/404.css" />
  </head>
  <body class="error-page">
    <main class="error-shell">
      <div class="error-card">
        <p class="error-code">404</p>
        <h1>We couldn’t find that page</h1>
        <p>
          The page may have moved, been renamed, or the link could be incorrect. Use the button
          below to return to the workspace.
        </p>
        <div class="error-actions">
          <a href="/" class="btn btn-primary">Go home</a>
          <a href="/pages/dashboard/user.html" class="btn btn-outline">Open dashboard</a>
        </div>
      </div>
    </main>
  </body>
</html>
