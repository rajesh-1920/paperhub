<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Queue - PaperHub</title>
    <script src="../../assets/js/tailwind-setup.js"></script>
    <link rel="stylesheet" href="../../assets/css/global.css" />
  </head>
  <body class="review-queue-page">
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <main>
      <div class="page-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Review Flow</p>
            <h1>Review Queue</h1>
          </div>
        </div>

        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="high">High Priority</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="in-review">In Review</button>
        </div>

        <div class="table-container">
          <div class="table-header">
            <input type="text" placeholder="Search documents..." class="review-search-input" />
          </div>
          <table>
            <thead>
              <tr><th><input type="checkbox" class="review-checkbox" /></th><th>Document Name</th><th>Submitted By</th><th>Date Submitted</th><th>Priority</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="reviewTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/review.js"></script>
  </body>
</html>
