<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Files - PaperHub</title>
    <script src="../../assets/js/tailwind-setup.js"></script>
    <link rel="stylesheet" href="../../assets/css/global.css" />
  </head>
  <body class="file-details-page">
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <main>
      <div class="page-content">
        <div class="page-header">
          <div>
            <p class="eyebrow">Repository</p>
            <h1>My Files</h1>
          </div>
          <a href="upload.html" class="btn btn-primary">Upload New</a>
        </div>

        <div class="table-container">
          <div class="table-header">
            <input type="text" placeholder="Search documents..." class="file-search-input" />
            <select class="file-status-filter">
              <option value="">All Status</option>
              <option value="completed">Completed</option>
              <option value="reviewing">Reviewing</option>
              <option value="pending">Pending</option>
            </select>
          </div>

          <table>
            <thead>
              <tr><th>Document Name</th><th>Size</th><th>Status</th><th>Uploaded</th><th>Actions</th></tr>
            </thead>
            <tbody id="fileTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/file.js"></script>
  </body>
</html>
