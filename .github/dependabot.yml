version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Tailwind v4 is a breaking change; the project uses the v3 config + CLI.
      # Migrate deliberately rather than via an automated major bump.
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
