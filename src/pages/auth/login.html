<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PaperHub</title>
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/pages/auth/login.css" />
  </head>
  <body class="login-page">
    <div class="auth-container">
      <div class="auth-left">
        <div>
          <svg
            width="80"
            height="80"
            viewBox="0 0 32 32"
            fill="currentColor"
            class="auth-logo-icon"
          >
            <path
              d="M8 2C5.24 2 3 4.24 3 7v18c0 2.76 2.24 5 5 5h16c2.76 0 5-2.24 5-5V7c0-2.76-2.24-5-5-5H8zm0 2h16c1.66 0 3 1.34 3 3v18c0 1.66-1.34 3-3 3H8c-1.66 0-3-1.34-3-3V7c0-1.66 1.34-3 3-3z"
            />
            <path d="M10 8h12v2H10zm0 4h12v2H10zm0 4h12v2H10zm0 4h8v2h-8z" />
          </svg>
          <h1>Welcome Back</h1>
          <p>Sign in to access your secure document management platform and continue your work.</p>
        </div>
      </div>

      <div class="auth-right">
        <form class="auth-form" id="loginForm">
          <h2>Sign In</h2>
          <p class="auth-form-subtitle">Enter your credentials to continue</p>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="remember-forgot">
            <div class="checkbox-wrapper">
              <input type="checkbox" id="rememberMe" name="rememberMe" />
              <label for="rememberMe" class="remember-label">Remember me</label>
            </div>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg">Sign In</button>

          <div class="auth-divider">
            <span>OR</span>
          </div>

          <button type="button" class="btn btn-outline btn-lg">Continue with Google</button>

          <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign up here</a>
          </div>
        </form>
      </div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/auth.js"></script>
  </body>
</html>
